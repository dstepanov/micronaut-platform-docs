# Curated module descriptions for the platform overview cards.
# Keys use the slugs from gradle/platform-doc-projects.properties.
project.core.shortDescription=Core framework runtime
project.core.longDescription=Micronaut Core supplies runtime APIs and compile-time infrastructure for injection, configuration, AOP, validation, HTTP, serialization, and native images so platform modules build fast, modular applications consistently across diverse deployment environments.
project.test.shortDescription=Testing support
project.test.longDescription=Micronaut Test connects JUnit, Spock, Kotest, embedded servers, clients, dependency injection, transactions, and contexts so tests exercise real wiring while remaining isolated, repeatable, and CI-friendly across local and pipeline runs.
project.kotlin.shortDescription=Kotlin language support
project.kotlin.longDescription=Micronaut Kotlin adds Kotlin-friendly extensions, annotation processing guidance, coroutine support, nullability-aware APIs, and testing conveniences so idiomatic Kotlin keeps compile-time injection, configuration binding, and native-image readiness across service modules cleanly.
project.spring.shortDescription=Spring integration extensions
project.spring.longDescription=Micronaut Spring supports selected Spring annotations, beans, events, transactions, and integration patterns so migrated code can run on the lightweight container while teams adopt compile-time injection gradually with less rewriting.
project.liquibase.shortDescription=Liquibase integration
project.liquibase.longDescription=Micronaut Liquibase runs changelogs during startup or deployment, connecting migrations to datasources, contexts, labels, rollback files, and per-datasource settings so schemas evolve predictably beside dependent services in every environment safely.
project.flyway.shortDescription=Flyway integration
project.flyway.longDescription=Micronaut Flyway runs versioned SQL or Java migrations for configured datasources, exposes migration settings through configuration, and keeps schema changes aligned with releases without custom startup code in services reliably.
project.elasticsearch.shortDescription=Elasticsearch integration
project.elasticsearch.longDescription=Micronaut Elasticsearch configures clients, health checks, and cluster access for search-backed applications, supporting indexing and querying while keeping search infrastructure injectable, configurable, and testable across environments without custom setup code.
project.graphql.shortDescription=GraphQL integration
project.graphql.longDescription=Micronaut GraphQL provides schema loading, data fetchers, instrumentation, execution configuration, and runtime wiring so GraphQL APIs share injection, validation, security, testing, and configuration with HTTP services inside production applications cleanly.
project.grpc.shortDescription=gRPC integration
project.grpc.longDescription=Micronaut gRPC adds server and client support for protobuf stubs, services, channels, interceptors, SSL, and health checks while keeping RPC components injectable, configurable, and lifecycle-managed beside HTTP endpoints and services.
project.kafka.shortDescription=Kafka messaging
project.kafka.longDescription=Micronaut Kafka integrates producers, consumers, and event-driven workflows with serialization, batching, offsets, errors, health checks, and configuration so services exchange typed messages through injectable components with predictable lifecycle behavior reliably.
project.groovy.shortDescription=Groovy language support
project.groovy.longDescription=Micronaut Groovy supports Groovy applications with compile-time processing, AST integration, testing conveniences, and language-specific behavior so Groovy code uses injection, configuration, AOP, and HTTP APIs efficiently with native-image readiness preserved.
project.micrometer.shortDescription=Metrics instrumentation
project.micrometer.longDescription=Micronaut Micrometer connects applications to metrics registries with binders, annotations, management endpoints, and configuration so HTTP, messaging, cache, database, and custom telemetry is published consistently without manual metrics plumbing code.
project.sql.shortDescription=SQL database support
project.sql.longDescription=Micronaut SQL provides JDBC infrastructure for datasource configuration, pools, transactions, schema tooling, and persistence support, giving applications a consistent base for relational access across environments while staying platform aligned cleanly.
project.mongodb.shortDescription=MongoDB integration
project.mongodb.longDescription=Micronaut MongoDB configures clients, BSON codecs, health checks, optional transactions, and repository access so document database connectivity remains injectable, lifecycle-managed, and consistent across application environments without custom connection setup code.
project.redis.shortDescription=Redis integration
project.redis.longDescription=Micronaut Redis integrates Redis clients for caching, pub/sub, health checks, connection settings, and data access so services use fast state and messaging through configured beans instead of custom setup code.
project.neo4j.shortDescription=Neo4j integration
project.neo4j.longDescription=Micronaut Neo4j connects applications to graph databases with managed drivers, sessions, transactions, and health checks so graph access works with HTTP, repositories, validation, security, and configuration in one application model.
project.rabbitmq.shortDescription=RabbitMQ messaging
project.rabbitmq.longDescription=Micronaut RabbitMQ provides AMQP messaging with publishers, listeners, exchanges, queues, acknowledgements, serialization, retries, error handling, and configuration so message-driven components remain typed, injectable, and testable beside other application beans reliably.
project.aws.shortDescription=AWS cloud integrations
project.aws.longDescription=Micronaut AWS integrates serverless functions, SDK clients, parameters, secrets, messaging, storage, tracing, and deployment support so services consume Amazon infrastructure through injection and configuration instead of custom bootstrap per module.
project.rss.shortDescription=RSS feed generation
project.rss.longDescription=Micronaut RSS publishes standards-compatible feeds with feed models, entries, metadata, links, and response rendering so services expose updates or articles without assembling XML manually or duplicating response logic in endpoints.
project.gcp.shortDescription=Google Cloud integrations
project.gcp.longDescription=Micronaut GCP integrates functions, cloud clients, configuration, tracing, logging, and runtime behavior so applications target Google Cloud while keeping development and testing familiar through injected services and settings locally too.
project.kubernetes.shortDescription=Kubernetes integration
project.kubernetes.longDescription=Micronaut Kubernetes supports service discovery, configuration, health, leader election, service account access, and cluster metadata so applications adapt to Kubernetes without scattering infrastructure code through business components or profiles repeatedly.
project.acme.shortDescription=ACME certificate automation
project.acme.longDescription=Micronaut ACME automates certificate issuance and renewal with ACME challenge handling, configuration, and HTTPS integration points for services that need certificates without manual operational scripts during deployment and renewal workflows.
project.openapi.shortDescription=OpenAPI and Swagger
project.openapi.longDescription=Micronaut OpenAPI generates API descriptions, schemas, Swagger UI assets, and documentation from code, helping HTTP APIs publish accurate contracts without maintaining separate specifications manually during development and release workflows reliably.
project.security.shortDescription=Security solution
project.security.longDescription=Micronaut Security provides authentication and authorization with tokens, sessions, OAuth, OpenID Connect, LDAP, intercept rules, endpoint protection, and events while keeping policies configurable, explicit, and testable across services and environments.
project.views.shortDescription=Server-side views
project.views.longDescription=Micronaut Views integrates server-side templates with HTTP applications, handling view resolution, model binding, static resources, rendering configuration, and HTML responses through normal controllers, validation, security, and injection like APIs too.
project.picocli.shortDescription=Picocli command apps
project.picocli.longDescription=Micronaut Picocli combines command-line applications with dependency injection, configuration, testing utilities, native-image packaging, and distribution patterns so CLI tools share services without HTTP bootstrap or separate startup code at runtime.
project.hibernate-validator.shortDescription=Hibernate Validator integration
project.hibernate-validator.longDescription=Micronaut Hibernate Validator integrates Hibernate Validator with managed components, supporting constraints, validator factories, localized messages, bean validation, controller argument validation, and configuration validation through familiar Jakarta Validation behavior and semantics.
project.cassandra.shortDescription=Cassandra integration
project.cassandra.longDescription=Micronaut Cassandra configures drivers, sessions, serialization, and health checks for Apache Cassandra clusters so services inject database resources and participate in the application lifecycle across local and deployed environments cleanly.
project.jmx.shortDescription=JMX monitoring
project.jmx.longDescription=Micronaut JMX exposes application state through JVM management tooling with management beans, metrics views, operational data, and configuration beside HTTP management endpoints and monitoring systems without custom adapters or code.
project.data.shortDescription=Data repository support
project.data.longDescription=Micronaut Data precomputes repository queries ahead of time and executes them through a small runtime layer for SQL and NoSQL stores, pagination, transactions, projections, criteria APIs, and reflection-free repository access.
project.cache.shortDescription=Cache abstraction
project.cache.longDescription=Micronaut Cache adds annotation-driven caching with pluggable backends, key generation, invalidation, conditions, async behavior, and backend configuration while keeping cache decisions near services and portable across infrastructure choices in tests.
project.nats.shortDescription=NATS messaging
project.nats.longDescription=Micronaut NATS integrates injectable publishers and subscribers with serialization, request-reply patterns, configuration binding, connection lifecycle, and event-driven components for typed service messaging without ad hoc glue code in applications reliably.
project.jackson-xml.shortDescription=Jackson XML support
project.jackson-xml.longDescription=Micronaut Jackson XML adds XML media support for HTTP clients, controllers, and codecs using Jackson, content negotiation, serialization configuration, and object mapping for integrations still depending on XML contracts today.
project.jaxrs.shortDescription=JAX-RS compatibility
project.jaxrs.longDescription=Micronaut JAX-RS supports selected Jakarta REST annotations and HTTP patterns so teams reuse JAX-RS-style controllers, parameters, and metadata on compile-time routing and injection during incremental migration from older stacks safely.
project.servlet.shortDescription=Servlet runtime support
project.servlet.longDescription=Micronaut Servlet runs applications on Jetty, Tomcat, Undertow, and other servlet containers while adapting controllers, filters, configuration, injection, and security to servlet deployments that require existing container infrastructure in production.
project.rxjava3.shortDescription=RxJava 3 integration
project.rxjava3.longDescription=Micronaut RxJava 3 integrates RxJava types with HTTP clients, controllers, conversion services, and components so reactive flows remain usable in APIs and services with configuration, lifecycle, injection, and testing support.
project.reactor.shortDescription=Project Reactor integration
project.reactor.longDescription=Micronaut Reactor integrates Mono, Flux, and Reactor context behavior with HTTP handling, conversion, clients, filters, controllers, services, and observability across reactive applications using dependency injection and configuration in production systems.
project.azure.shortDescription=Microsoft Azure integrations
project.azure.longDescription=Micronaut Azure connects applications to Azure services and hosting models with functions, cloud clients, configuration, identity, tracing, and deployment workflows through injection and settings from local development to production cloud.
project.jms.shortDescription=JMS messaging
project.jms.longDescription=Micronaut JMS integrates producers, listeners, destinations, acknowledgements, transactions, serialization, and configuration so enterprise messaging uses typed handlers and injection with existing brokers and repeatable integration test suites in CI too.
project.discovery-client.shortDescription=Service discovery
project.discovery-client.longDescription=Micronaut Discovery Client provides service registration and lookup with Consul, Eureka, health integration, metadata, and configuration-driven resolution so clients avoid hardcoded locations and duplicated discovery logic across modules in services.
project.oracle-cloud.shortDescription=Oracle Cloud integrations
project.oracle-cloud.longDescription=Micronaut Oracle Cloud integrates OCI functions, SDK clients, configuration, authentication, object storage, and deployment workflows so services consume cloud resources through injected clients and environment-aware configuration in deployments and tests.
project.pulsar.shortDescription=Apache Pulsar messaging
project.pulsar.longDescription=Micronaut Pulsar integrates producers and consumers with subscriptions, schemas, serialization, error handling, configuration, and typed message handlers for lifecycle-managed event-driven services across development and production environments using dependency injection reliably.
project.mqtt.shortDescription=MQTT messaging
project.mqtt.longDescription=Micronaut MQTT supports publish and subscribe workflows for MQTT brokers with topics, serialization, quality-of-service options, connection settings, and handler methods for IoT messaging through framework components and tests locally too.
project.r2dbc.shortDescription=R2DBC database support
project.r2dbc.longDescription=Micronaut R2DBC provides reactive relational connectivity with clients, connection configuration, transactions, health checks, and repositories so nonblocking services use SQL without JDBC or separate database setup code in tests too.
project.coherence.shortDescription=Oracle Coherence integration
project.coherence.longDescription=Micronaut Coherence integrates Oracle Coherence for distributed caches, sessions, repositories, configuration, health checks, and data-grid patterns through injected components instead of custom bootstrap or scattered cache access code in applications.
project.multitenancy.shortDescription=Multitenancy support
project.multitenancy.longDescription=Micronaut Multitenancy provides tenant resolution and propagation with filters, resolvers, configuration, and helper APIs so routing, data access, and services react to tenant context without duplicating tenant plumbing everywhere repeatedly.
project.problem-json.shortDescription=Problem JSON responses
project.problem-json.longDescription=Micronaut Problem JSON returns RFC 7807 error payloads with exception mapping, validation errors, content negotiation, and structured details so clients receive predictable documents instead of endpoint-specific responses and handlers everywhere.
project.aot.shortDescription=AOT optimizations
project.aot.longDescription=Micronaut AOT performs ahead-of-time optimizations that precompute metadata, reduce startup work, improve native-image behavior, and tune runtime artifacts for faster, smaller deployments while preserving framework features and configuration flexibility intact.
project.serde.shortDescription=Build-time serialization
project.serde.longDescription=Micronaut Serialization generates reflection-free serializers and deserializers from compile-time metadata for JSON, JSON-B, Jackson annotations, BSON, custom serializers, and fast native-image payload handling without runtime introspection or reflection costs overhead.
project.toml.shortDescription=TOML configuration
project.toml.longDescription=Micronaut TOML loads configuration from TOML property sources so structured settings flow into environments, configuration properties, validation, and injection like other supported formats in the platform configuration model cleanly too.
project.email.shortDescription=Transactional email
project.email.longDescription=Micronaut Email abstracts message composition and sending with provider integrations, templates, attachments, configuration, transactional workflows, and test-friendly APIs for application mail delivery without binding business code to transports or providers.
project.tracing.shortDescription=Distributed tracing
project.tracing.longDescription=Micronaut Tracing propagates trace context through HTTP, messaging, and service flows, instruments framework components, and connects applications to tracing backends for request visibility, latency analysis, and failure investigation across services.
project.object-storage.shortDescription=Object storage abstraction
project.object-storage.longDescription=Micronaut Object Storage provides uniform APIs for reading, writing, deleting, and listing objects across cloud providers while configuration selects the concrete backend per environment, deployment, or repeatable test suite locally.
project.chatbots.shortDescription=Chatbot integrations
project.chatbots.longDescription=Micronaut Chatbots helps build bot workflows with request handling, commands, responses, security, configuration, and deployment patterns so bot logic uses injected application services instead of platform-specific webhook code per target.
project.test-resources.shortDescription=Test resource provisioning
project.test-resources.longDescription=Micronaut Test Resources provisions external dependencies for tests and local development, starting containers or services and providing connection properties for databases, brokers, or cloud-like services so tests match production wiring.
project.validation.shortDescription=Validation support
project.validation.longDescription=Micronaut Validation performs bean validation from compile-time metadata, handling constraints, controller arguments, configuration properties, localized messages, and validators without reflection-heavy scanning or duplicated rules across controllers, services, and settings objects.
project.session.shortDescription=HTTP session support
project.session.longDescription=Micronaut Session adds HTTP session management with stores, cookies, filters, configuration, and security integration so server-side user state remains explicit, testable, and framework-managed across environments and deployment models cleanly too.
project.control-panel.shortDescription=Development control panel
project.control-panel.longDescription=Micronaut Control Panel provides a development UI for inspecting routes, beans, configuration, environment details, management information, and operational state without custom debug endpoints or log digging during feature work locally.
project.logging.shortDescription=Logging dependency set
project.logging.longDescription=Micronaut Logging coordinates logging dependencies, APIs, implementations, bridges, configuration, and versions so platform-aligned services, libraries, tests, and examples avoid conflicts and inconsistent setup across generated documentation and applications as well.
project.sourcegen.shortDescription=Source generation API
project.sourcegen.longDescription=Micronaut Sourcegen provides APIs for generating source code from structured models, supporting Java, Kotlin, and tooling artifacts with shared abstractions for names and types, members, files, and generated code cleanly.
project.eclipsestore.shortDescription=EclipseStore integration
project.eclipsestore.longDescription=Micronaut EclipseStore integrates object persistence with storage configuration, health checks, injected storage components, and data access patterns so services persist graphs with familiar lifecycle, configuration, and testing workflows locally too.
project.opensearch.shortDescription=OpenSearch integration
project.opensearch.longDescription=Micronaut OpenSearch configures clients and health checks for OpenSearch clusters, supporting indexing, searching, and environment-specific settings without custom clients or scattered search configuration inside services and tests across deployments reliably.
project.json-schema.shortDescription=JSON Schema support
project.json-schema.longDescription=Micronaut JSON Schema generates schemas from application and serialization models, including configuration and validation metadata, so teams publish machine-readable contracts without separate schema sources or duplicated model metadata in tooling.
project.guice.shortDescription=Guice module import
project.guice.longDescription=Micronaut Guice lets applications reuse selected Guice modules and bindings inside framework applications, supporting interoperability while new components adopt the compile-time bean model during gradual migrations with less rewriting safely.
project.graal-languages.shortDescription=Graal language integration
project.graal-languages.longDescription=Micronaut Graal Languages integrates GraalVM dynamic language runtimes and polyglot capabilities so language-specific components can participate in configuration and dependency injection beside JVM code where useful and practical for services.
project.langchain4j.shortDescription=LangChain4j integration
project.langchain4j.longDescription=Micronaut LangChain4j integrates AI services with model clients, tools, embeddings, retrieval workflows, and injectable components while preserving configuration, lifecycle, testing, and observability for production AI features and deployments reliably too.
project.mcp.shortDescription=Model Context Protocol
project.mcp.longDescription=Micronaut MCP adds Model Context Protocol support for exposing tools, resources, prompts, and server capabilities through framework-managed components, configuration, injection, and lifecycle management instead of standalone protocol wiring or bridges.
project.openrewrite.shortDescription=OpenRewrite recipes
project.openrewrite.longDescription=Micronaut OpenRewrite provides recipes for migrations, dependency updates, source transformations, and modernization tasks so teams apply consistent, reviewable changes across applications and libraries for current and future platform releases safely.

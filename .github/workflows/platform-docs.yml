name: Platform Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  plan:
    name: Plan platform docs shards
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Xmx4g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Write shard matrix
        run: ./gradlew -q writePlatformDocsShardMatrix

      - name: Publish shard matrix
        id: matrix
        shell: bash
        run: |
          {
            echo 'matrix<<EOF'
            cat build/platform-docs-shard-matrix.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build-guides:
    name: Render platform fragment shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs:
      - plan
      - test-build-logic
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Xmx4g
      PLATFORM_DOCS_GUIDE_SHARD_COUNT: ${{ matrix.shard_count }}
      PLATFORM_DOCS_GUIDE_SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Render platform fragment shard
        run: ./gradlew -q verifyPlatformAlignment stagePlatformGuideDocsArtifact

      - name: Upload platform fragment shard
        uses: actions/upload-artifact@v6
        with:
          name: platform-doc-fragments-shard-${{ matrix.shard }}
          path: build/guide-docs-artifact
          if-no-files-found: error
          retention-days: 1

  test-build-logic:
    name: Test build logic
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: plan
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Xmx4g
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run fast build logic tests
        run: ./gradlew :buildSrc:test --tests 'io.micronaut.docs.GitSupportTest' --tests 'io.micronaut.docs.VerifyPlatformDocsTaskTest'

  render:
    name: Render platform docs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-guides
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Xmx4g
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download platform fragment shards
        uses: actions/download-artifact@v6
        with:
          pattern: platform-doc-fragments-shard-*
          path: .
          merge-multiple: true

      - name: Render, verify, and test platform docs
        run: |
          ./gradlew -q verifyRenderedPlatformDocs
          ./gradlew :buildSrc:test

      - name: Upload generated site
        uses: actions/upload-artifact@v6
        with:
          name: micronaut-platform-docs-site
          path: build/site
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/site

  deploy:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: render
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
